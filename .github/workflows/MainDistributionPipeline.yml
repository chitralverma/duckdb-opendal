# Build, test, and (optionally) release the extension.
name: Main Extension Distribution Pipeline
on:
  # Only build main + tags on push; feature branches are covered by pull_request,
  # so an open PR does not run the pipeline twice. Tags are required by the
  # create-release-draft job.
  push:
    branches: [main]
    tags: ['**']
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || '' }}-${{ github.base_ref || '' }}-${{ github.ref != 'refs/heads/main' && github.sha || '' }}
  cancel-in-progress: true

jobs:
  duckdb-stable-build:
    name: Build extension binaries
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.5-variegata
    with:
      duckdb_version: v1.5.4
      ci_tools_version: v1.5-variegata
      extension_name: opendal
      extra_toolchains: "rust"
      # Exclude:
      # - WASM targets: extension-ci-tools pins rust-toolchain@1.86 which is below opendal's MSRV (1.91). See https://github.com/duckdb/extension-ci-tools/issues/385
      # - Windows MinGW target: Rtools MinGW toolchain is missing libgcc_eh.a which is required by rustc for the gnu target. Rely on standard MSVC instead.
      exclude_archs: 'wasm_mvp;wasm_eh;wasm_threads;windows_amd64_rtools;windows_amd64_mingw'

  code-quality-check:
    name: Code Quality Check
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_code_quality.yml@v1.5-variegata
    with:
      duckdb_version: v1.5.4
      ci_tools_version: v1.5-variegata
      extension_name: opendal
      format_checks: 'format;tidy'

  # Build once, then run the SQLLogicTest tiers against every service the planner
  # discovers (docs/testing.md). Secret-gated services are dropped without secrets.
  sql-tests:
    name: SQL tests
    runs-on: ubuntu-latest
    env:
      GEN: ninja
      HAVE_SECRETS: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: 'recursive'

      - name: Install build tools
        run: sudo apt-get update -y -qq && sudo apt-get install -y -qq ninja-build ccache

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-sqltests-ccache-${{ github.sha }}
          restore-keys: ${{ runner.os }}-sqltests-ccache-

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-sqltests-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-sqltests-cargo-

      - name: Build extension
        run: make

      - name: Run test tiers
        run: |
          set -euo pipefail
          names=$(python3 test/services/plan.py --have-secrets "$HAVE_SECRETS" --names)
          provisioned=$(python3 test/services/plan.py --have-secrets "$HAVE_SECRETS" --provisioned)
          echo "services: $names"
          echo "provisioned: $provisioned"
          for name in $names; do
            echo "::group::service $name"
            if echo " $provisioned " | grep -q " $name "; then
              # Always tear down (even on failure) so a later service can reuse ports.
              rc=0
              make "$name-up" || rc=$?
              if [ "$rc" -eq 0 ]; then make "test-common-$name" || rc=$?; fi
              if [ "$rc" -eq 0 ] && make -n "$name-assert-no-incomplete" >/dev/null 2>&1; then
                make "$name-assert-no-incomplete" || rc=$?
              fi
              make "$name-down" || true
              [ "$rc" -eq 0 ] || exit "$rc"
            else
              make "test-common-$name"
            fi
            echo "::endgroup::"
          done

  create-release-draft:
    name: Create draft release with built binaries
    needs:
      - duckdb-stable-build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Rename and flatten artifacts
        run: |
          echo "Processing downloaded artifacts:"
          ls -R dist || true
          for dir in dist/*/; do
            if [ -d "$dir" ]; then
              dir_name=$(basename "$dir")
              echo "Processing directory: $dir_name"
              for file in "$dir"*; do
                if [ -f "$file" ]; then
                  ext="${file##*.}"
                  dest="dist/${dir_name}.${ext}"
                  echo "Renaming $file to $dest"
                  mv "$file" "$dest"
                fi
              done
              rm -rf "$dir"
            fi
          done
          echo "Flattened artifacts:"
          ls -la dist || true

      - name: Create draft release and upload assets
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          name: duckdb-opendal ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
