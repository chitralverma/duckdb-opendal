# Staged pipeline: checks (cpp | rust) -> tests (rust + sql) -> build -> release (tags).
name: Main Extension Distribution Pipeline
run-name: Pipeline — ${{ github.head_ref || github.ref_name }} (${{ github.event_name }})
on:
  push:
    branches: [main]
    tags: ['**']
  pull_request:
  workflow_dispatch:
  # Daily rebuild against the latest v1.5.x patch (duckdb_version tracks a branch).
  schedule:
    - cron: '0 6 * * *'

# One run per branch/PR/tag; a new push cancels the in-flight run.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

# Least-privilege default; create-release-draft overrides with contents: write.
permissions:
  contents: read

jobs:
  cpp-checks:
    name: C++ checks (format, tidy)
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_code_quality.yml@v1.5-variegata
    with:
      duckdb_version: v1.5-variegata
      ci_tools_version: v1.5-variegata
      extension_name: opendal
      format_checks: 'format;tidy'

  rust-checks:
    name: Rust checks (fmt, clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: 'recursive'
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: cargo-registry-${{ hashFiles('opendal/Cargo.lock') }}
          restore-keys: cargo-registry-
      - name: Cache rust target
        uses: actions/cache@v4
        with:
          path: opendal/target/
          key: rust-target-${{ runner.os }}-${{ hashFiles('opendal/Cargo.lock') }}
          restore-keys: rust-target-${{ runner.os }}-
      - name: Rust format check
        run: make rust-fmt-check
      - name: Clippy
        run: make rust-lint

  rust-tests:
    name: Rust tests
    needs: [cpp-checks, rust-checks]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: 'recursive'
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: cargo-registry-${{ hashFiles('opendal/Cargo.lock') }}
          restore-keys: cargo-registry-
      - name: Cache rust target
        uses: actions/cache@v4
        with:
          path: opendal/target/
          key: rust-target-${{ runner.os }}-${{ hashFiles('opendal/Cargo.lock') }}
          restore-keys: rust-target-${{ runner.os }}-
      - name: Rust tests
        run: make rust-test

  sql-tests:
    name: SQL tests
    needs: [cpp-checks, rust-checks]
    runs-on: ubuntu-latest
    env:
      GEN: ninja
      CCACHE_DIR: ${{ github.workspace }}/ccache_dir
      HAVE_SECRETS: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: 'recursive'

      - name: Install build tools
        run: sudo apt-get update -y -qq && sudo apt-get install -y -qq ninja-build ccache

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # ccache: extension-ci-tools rotating-key pattern (own lineage — the reusable
      # linux build compiles inside manylinux docker, so its cache can't be reused).
      - name: Generate timestamp for Ccache entry
        id: ccache_timestamp
        run: echo "timestamp=$(date -u '+%Y-%m-%d-%H;%M;%S')" >> "$GITHUB_OUTPUT"

      - name: Create Ccache directory
        run: mkdir -p ccache_dir

      - name: Load Ccache
        uses: actions/cache/restore@v4
        with:
          path: ./ccache_dir
          key: ccache-sqltests-${{ runner.os }}-v1.5-variegata-${{ steps.ccache_timestamp.outputs.timestamp }}
          restore-keys: |
            ccache-sqltests-${{ runner.os }}-v1.5-variegata-
            ccache-sqltests-${{ runner.os }}-

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: cargo-registry-${{ hashFiles('opendal/Cargo.lock') }}
          restore-keys: cargo-registry-

      - name: Build extension
        run: make

      - name: Save Ccache
        uses: actions/cache/save@v4
        with:
          path: ./ccache_dir
          key: ccache-sqltests-${{ runner.os }}-v1.5-variegata-${{ steps.ccache_timestamp.outputs.timestamp }}

      - name: Run test tiers
        run: |
          set -euo pipefail
          names=$(python3 test/services/plan.py --have-secrets "$HAVE_SECRETS" --names)
          provisioned=$(python3 test/services/plan.py --have-secrets "$HAVE_SECRETS" --provisioned)
          echo "services: $names"
          echo "provisioned: $provisioned"
          for name in $names; do
            echo "::group::service $name"
            if echo " $provisioned " | grep -q " $name "; then
              # Always tear down (even on failure) so a later service can reuse ports.
              rc=0
              make "$name-up" || rc=$?
              if [ "$rc" -eq 0 ]; then make "test-common-$name" || rc=$?; fi
              if [ "$rc" -eq 0 ] && make -n "$name-assert-no-incomplete" >/dev/null 2>&1; then
                make "$name-assert-no-incomplete" || rc=$?
              fi
              make "$name-down" || true
              [ "$rc" -eq 0 ] || exit "$rc"
            else
              make "test-common-$name"
            fi
            echo "::endgroup::"
          done

  # Per-platform binaries. Tests already ran, so skip_tests — build + upload only.
  build:
    name: Build extension binaries
    needs: [rust-tests, sql-tests]
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.5-variegata
    with:
      # Track the v1.5 release branch (auto-picks v1.5.x patches). Flip only on a
      # DuckDB minor bump. See MAINTAINING.md.
      duckdb_version: v1.5-variegata
      ci_tools_version: v1.5-variegata
      extension_name: opendal
      extra_toolchains: "rust"
      skip_tests: true
      # Exclude:
      # - WASM targets: extension-ci-tools pins rust-toolchain@1.86 which is below opendal's MSRV (1.91). See https://github.com/duckdb/extension-ci-tools/issues/385
      # - Windows MinGW target: Rtools MinGW toolchain is missing libgcc_eh.a which is required by rustc for the gnu target. Rely on standard MSVC instead.
      exclude_archs: 'wasm_mvp;wasm_eh;wasm_threads;windows_amd64_rtools;windows_amd64_mingw'

  # Downloadable per-platform binaries (unsigned/manual installs); the community
  # registry builds from source and doesn't use these. See MAINTAINING.md.
  create-release-draft:
    name: Create draft release with built binaries
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Rename and flatten artifacts
        run: |
          echo "Processing downloaded artifacts:"
          ls -R dist || true
          for dir in dist/*/; do
            if [ -d "$dir" ]; then
              dir_name=$(basename "$dir")
              echo "Processing directory: $dir_name"
              for file in "$dir"*; do
                if [ -f "$file" ]; then
                  ext="${file##*.}"
                  dest="dist/${dir_name}.${ext}"
                  echo "Renaming $file to $dest"
                  mv "$file" "$dest"
                fi
              done
              rm -rf "$dir"
            fi
          done
          echo "Flattened artifacts:"
          ls -la dist || true

      - name: Create draft release and upload assets
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          name: duckdb-opendal ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
