autogen_warning = "/* Warning: this file is autogenerated by cbindgen. Do not edit by hand. */"
cpp_compat = true
include_guard = "DUCKDB_OPENDAL_RUST_H"
language = "C"
pragma_once = true
style = "both"
tab_width = 4
# Carry Rust doc-comments (incl. the `# Safety` notes on each FFI fn) into
# rust.h as Doxygen comments, so the C++ side sees the ownership/lifetime rules.
documentation = true
documentation_style = "doxy"

[parse]
parse_deps = false

[export]
prefix = ""

[fn]
rename_args = "None"

[enum]
# Keep Rust variant names (Ok, NotFound, …) so the C++ side references them as
# OdErrorCode::Ok. (Avoids a ScreamingSnakeCase `OK` that could collide with
# platform macros.)
rename_variants = "None"
