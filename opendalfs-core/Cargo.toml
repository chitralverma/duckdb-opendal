[package]
name = "opendalfs-core"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
description = "OpenDAL FFI core for the duckdb-opendal filesystem extension"

[lib]
# Static link into the DuckDB C++ extension (via Corrosion).
crate-type = ["staticlib"]

[dependencies]
# Pinned per plan §2. Local dev enables only memory + fs services for now;
# more services + layers are gated behind features and enabled incrementally.
opendal = { version = "0.57.0", default-features = false, features = [
    "executors-tokio",
    # Registers service schemes so string-based `Operator::via_iter("<scheme>", ..)`
    # works. Without this, via_iter reports "scheme is not registered".
    "auto-register-services",
    # Layers (Phase 3): configurable per operator via odop_operator_new.
    "layers-retry",
    "layers-timeout",
    "layers-concurrent-limit",
    # Foyer hybrid (memory + disk) cache layer (Phase 5), opt-in per secret.
    "layers-foyer",
    "services-memory",
    "services-fs",
    "services-s3",
] }
# foyer builder types for constructing the hybrid cache used by FoyerLayer.
# Pinned to match opendal-layer-foyer's transitive foyer version.
foyer = "0.22"
tokio = { version = "1", features = ["rt-multi-thread"] }

[build-dependencies]
cbindgen = "0.29"

[dev-dependencies]
tempfile = "3"
