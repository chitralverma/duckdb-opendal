language = "C"
include_guard = "OPENDALFS_RUST_H"
pragma_once = true
autogen_warning = "/* Warning: this file is autogenerated by cbindgen. Do not edit by hand. */"
tab_width = 4
style = "both"
cpp_compat = true

[parse]
parse_deps = false

[export]
prefix = ""

[fn]
rename_args = "None"

[enum]
# Keep Rust variant names (Ok, NotFound, …) so the C++ side references them as
# OdopErrorCode::Ok. (Avoids a ScreamingSnakeCase `OK` that could collide with
# platform macros.)
rename_variants = "None"
